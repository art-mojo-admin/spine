# Support & CSM App Installation Example
# Complete example for installing the Support & CSM application

app:
  name: "Support & CSM"
  slug: "support"
  version: "1.0.0"
  external_app_id: "support-csm-v1"
  description: "Customer support and customer success management platform"
  author: "Spine Framework"

installation:
  # Step 1: Create installed_packs record
  pack_installation:
    account_id: "${TARGET_ACCOUNT_ID}"
    external_app_id: "support-csm-v1"
    external_app_version: "1.0.0"
    install_mode: "full"
    manifest_version: 1
    
  # Step 2: Create app_definitions
  app_creation:
    - slug: "support"
      name: "Support & CSM"
      installed_pack_id: "${PACK_INSTALLATION_ID}"
      min_role: "member"
      nav_items:
        - key: "dashboard"
          to: "/support"
          label: "Support Dashboard"
          icon: "headphones"
          min_role: "member"
        - key: "queue"
          to: "/support/queue"
          label: "Support Queue"
          icon: "list"
          min_role: "operator"
        - key: "knowledge"
          to: "/support/knowledge"
          label: "Knowledge Base"
          icon: "book-open"
          min_role: "member"
        - key: "community"
          to: "/support/community"
          label: "Community"
          icon: "users"
          min_role: "member"
        - key: "analytics"
          to: "/support/analytics"
          label: "Analytics"
          icon: "bar-chart"
          min_role: "admin"
      default_view: "support_dashboard"
      integration_deps:
        - "email"
        - "ai-support"
        
  # Step 3: Run data migrations
  migrations:
    - file: "migrations/001_support_setup.sql"
      description: "Create support item types and views"
      rollback_file: "migrations/rollback_001_support_setup.sql"
    - file: "migrations/002_support_categories.sql"
      description: "Create support categories and priorities"
      dependencies:
        - "001_support_setup"
    - file: "migrations/003_support_automations.sql"
      description: "Create support automation rules"
      dependencies:
        - "001_support_setup"
        - "002_support_categories"
        
  # Step 4: Verify installation
  verification:
    - check: "app_definition_exists"
      slug: "support"
    - check: "item_type_exists"
      slug: "support_case"
    - check: "item_type_exists"
      slug: "knowledge_article"
    - check: "item_type_exists"
      slug: "community_post"
    - check: "view_exists"
      slug: "support_dashboard"
    - check: "view_exists"
      slug: "support_queue"
    - check: "view_exists"
      slug: "knowledge_list"
    - check: "integration_exists"
      integration_id: "email"
    - check: "integration_exists"
      integration_id: "ai-support"

variables:
  TARGET_ACCOUNT_ID: "your-account-id-here"
