# App Installation Instructions Template
# Use this template for creating new app installation instructions
# Validate with: npx jsonschema docs/app-installation/schema.json your-app.yaml

app:
  name: "App Name"
  slug: "app-slug"
  version: "1.0.0"
  external_app_id: "app-v1"
  description: "App description for marketplace"
  author: "Author Name"
  dependencies:
    - "required-dependency"

installation:
  # Step 1: Create installed_packs record
  pack_installation:
    account_id: "${TARGET_ACCOUNT_ID}"
    external_app_id: "app-v1"
    external_app_version: "1.0.0"
    install_mode: "full"
    manifest_version: 1
    
  # Step 2: Create app_definitions
  app_creation:
    - slug: "app-slug"
      name: "App Name"
      installed_pack_id: "${PACK_INSTALLATION_ID}"
      min_role: "member"
      nav_items:
        - key: "dashboard"
          to: "/app-slug"
          label: "Dashboard"
          icon: "layout-dashboard"
          min_role: "member"
        - key: "settings"
          to: "/app-slug/settings"
          label: "Settings"
          icon: "settings"
          min_role: "admin"
      default_view: "app-dashboard"
      integration_deps:
        - "required-integration"
        
  # Step 3: Run data migrations
  migrations:
    - file: "migrations/001_app_setup.sql"
      description: "Create app item types and views"
      rollback_file: "migrations/rollback_001_app_setup.sql"
    - file: "migrations/002_app_data.sql"
      description: "Seed app categories and templates"
      dependencies:
        - "001_app_setup"
        
  # Step 4: Verify installation
  verification:
    - check: "app_definition_exists"
      slug: "app-slug"
    - check: "item_type_exists"
      slug: "app_item"
    - check: "view_exists"
      slug: "app-dashboard"
    - check: "integration_exists"
      integration_id: "required-integration"

# Optional: Variable definitions
variables:
  TARGET_ACCOUNT_ID: "your-account-id-here"
  CUSTOM_VAR: "custom-value"
