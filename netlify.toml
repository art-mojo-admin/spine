[build]
  command = "npm run build"
  publish = "dist"
  functions = "v2-core/functions"

  [build.environment]
    # Supabase VITE variables are meant to be public in the browser
    SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_DB_SCHEMA,VITE_APP_NAME,SUPABASE_URL,DB_SCHEMA"

# v2 functions configuration - direct from v2-core
[functions]
  directory = "v2-core/functions"
  included_files = ["v2-core/functions/**"]
  node_bundler = "esbuild"

[dev]
  command = "bash scripts/netlify-dev-wrapper.sh"
  port = 8888
  targetPort = 3001
  autoLaunch = false

[functions."trigger-scheduler"]
  schedule = "* * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
